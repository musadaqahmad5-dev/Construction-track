[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect legacy /api/ai/recommend-mvp to Netlify Serverless Function
[[redirects]]
  from = "/api/ai/recommend-mvp"
  to = "/.netlify/functions/recommend-mvp"
  status = 200

# Client-side single page app fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
